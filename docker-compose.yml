services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: onboarding
      POSTGRES_PASSWORD: onboarding
      POSTGRES_DB: onboarding
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg2://onboarding:onboarding@postgres:5432/onboarding
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
