services:
  - type: web
    name: onboarding-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: onboarding-db
          property: connectionString

databases:
  - name: onboarding-db
    plan: free
